# Stage 6 — Secret scanning in CI (Layer 3 backstop).
# Copy to .github/workflows/secret-scan.yml
# Scans the FULL git history on every push/PR and fails the run if a secret is found.
name: Secret Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — required for a complete scan

      # Default CI scanner: Gitleaks official action (reliable, reads .gitleaks.toml).
      # NOTE: free for public repos & personal accounts. For an ORGANISATION repo,
      # set a (free) GITLEAKS_LICENSE in repo secrets and uncomment it below.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── Prefer Betterleaks in CI too? ───────────────────────────────────────
      # Betterleaks is the preferred local scanner (original Gitleaks author, MIT).
      # To use it in CI, replace the step above with its Docker image (shared config):
      #   - name: Secret scan (betterleaks)
      #     run: |
      #       docker run --rm -v "$PWD:/repo" ghcr.io/betterleaks/betterleaks:latest \
      #         git /repo --redact --config /repo/.gitleaks.toml
      # The .gitleaks.toml config is shared, so no config change is needed.
