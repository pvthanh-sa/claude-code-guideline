# Stage 6 — Secret scanning in CI (Layer 3 backstop).
# Copy to .github/workflows/secret-scan.yml
# Scans the FULL git history on every push/PR and fails the run if a secret is found.
#
# Uses Betterleaks (the preferred scanner — original Gitleaks author, MIT) via its
# Docker image, sharing the same .gitleaks.toml as the local pre-push hook. No
# GitHub token or license is required (the gitleaks-action now requires a
# GITHUB_TOKEN for PRs and nags about a license — we avoid it).
name: Secret Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history — required for a complete scan

      - name: Secret scan (betterleaks)
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" -e HOME=/tmp \
            -v "$PWD:/repo" -w /repo \
            ghcr.io/betterleaks/betterleaks:latest \
            git . --redact --no-banner --config /repo/.gitleaks.toml
        # Exit code is non-zero when a secret is found → the job fails.
        # To also catch secrets in uncommitted/working-tree files, add a second
        # step that swaps `git .` for `dir .`.

      # ── Prefer the Gitleaks binary instead? ─────────────────────────────────
      # Betterleaks is a drop-in for Gitleaks and reads the same .gitleaks.toml.
      # If you'd rather run the gitleaks binary directly (not the action), use:
      #   - run: |
      #       curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
      #         | tar -xz gitleaks && ./gitleaks detect --no-banner --redact --config .gitleaks.toml
